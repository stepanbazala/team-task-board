<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Team Task Board</title>
    <script>
      // SPA fallback pro GitHub Pages – přesměruje na index.html se zachováním cesty
      var segmentCount = 1; // počet segmentů projektu v URL (pro /team-task-board/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
